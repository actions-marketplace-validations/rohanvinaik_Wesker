sonar.projectKey=rohanvinaik_Wesker
sonar.organization=rohanvinaik

sonar.projectName=Wesker
sonar.projectVersion=0.1.0

# Source layout — the package is Wesker/, not src/
sonar.sources=Wesker/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions — keep metrics honest by excluding non-production code
sonar.exclusions=\
  **/.claude/**,\
  **/.lintgate/**,\
  **/.wesker/**,\
  **/__pycache__/**,\
  **/*.md

# Don't flag test files for duplication or complexity
sonar.cpd.exclusions=tests/**

# Coverage exclusions — CLI/entry/orchestration modules are thin dispatch.
# Must match [tool.coverage.run].omit and [tool.wesker].exclude in pyproject.
sonar.coverage.exclusions=\
  tests/**,\
  Wesker/cli.py,\
  Wesker/__main__.py,\
  Wesker/__init__.py,\
  Wesker/metrics.py

# Treat these as test sources
sonar.test.inclusions=tests/**/*.py
